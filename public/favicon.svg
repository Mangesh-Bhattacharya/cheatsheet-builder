<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Sheet background -->
  <rect x="6" y="4" width="20" height="24" rx="2" fill="#111827" stroke="#4a9eff" stroke-width="2"/>

  <!-- Top math heading -->
  <text x="10" y="11" font-family="Inter, system-ui, sans-serif"
        font-size="5" fill="#e5e7eb">f(x)</text>

  <!-- Fraction-like structure -->
  <line x1="10" y1="14" x2="22" y2="14" stroke="#4a9eff" stroke-width="1.3"/>
  <text x="11" y="13" font-family="Inter, system-ui, sans-serif"
        font-size="3" fill="#9ca3af">ax + b</text>
  <text x="11" y="18" font-family="Inter, system-ui, sans-serif"
        font-size="3" fill="#9ca3af">cx + d</text>

  <!-- Sum symbol on the left -->
  <text x="9" y="22" font-family="Inter, system-ui, sans-serif"
        font-size="5" fill="#4ade80">∑</text>

  <!-- Small grid / list to the right -->
  <rect x="16" y="19" width="8" height="6" rx="1" fill="none" stroke="#4a9eff" stroke-width="0.8"/>
  <line x1="16" y1="21" x2="24" y2="21" stroke="#4a9eff" stroke-width="0.6"/>
  <line x1="20" y1="19" x2="20" y2="25" stroke="#4a9eff" stroke-width="0.6"/>

  <!-- Bottom underline accent -->
  <line x1="8" y1="26.5" x2="24" y2="26.5" stroke="#4a9eff" stroke-width="1"/>
</svg>
